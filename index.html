<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Arkanoid</title>
    <script>
      (() => {
        const historyEntryNumber = 224;
        const major = Math.floor(historyEntryNumber / 100);
        const minor = Math.floor((historyEntryNumber % 100) / 10);
        const patch = historyEntryNumber % 10;
        const version = `${major}.${minor}.${patch}`;
        const lastUpdated = "17.03.2026 16:41";
        window.APP_HISTORY_ENTRY_NUMBER = historyEntryNumber;
        window.APP_VERSION = version;
        window.APP_LAST_UPDATED = lastUpdated;
        const supportedLocales = ["pl", "en", "nl", "sv", "fi"];
        const browserLanguages = Array.isArray(navigator.languages) && navigator.languages.length
          ? navigator.languages
          : [navigator.language || "en"];
        const localeCandidates = browserLanguages.flatMap((languageTag) => {
          const normalized = String(languageTag || "").toLowerCase();
          const baseLanguage = normalized.split("-")[0];
          return normalized && normalized !== baseLanguage ? [normalized, baseLanguage] : [baseLanguage];
        });
        window.APP_LOCALE =
          localeCandidates.find((candidate) => supportedLocales.includes(candidate)) || "en";

        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `styles.css?v=${encodeURIComponent(version)}`;
        document.head.appendChild(stylesheet);
      })();
    </script>
  </head>
  <body>
    <div class="top-chrome">
      <div class="brand-banner brand-wordmark" aria-label="Arkanoid">
        <span class="brand-chip color-1">A</span>
        <span class="brand-chip color-6">R</span>
        <span class="brand-chip color-3">K</span>
        <span class="brand-chip color-4">A</span>
        <span class="brand-chip color-8">N</span>
        <span class="brand-chip color-2">O</span>
        <span class="brand-chip color-5">I</span>
        <span class="brand-chip color-7">D</span>
      </div>

      <div class="hud">
        <div class="panel stats" aria-live="polite">
          <div class="stat stat-level">
            <span class="label" id="hudLevelLabel">Poziom</span>
            <span class="value" id="level">1</span>
          </div>
          <div class="stat">
            <span class="label" id="hudScoreLabel">Wynik</span>
            <span class="value" id="score">0</span>
          </div>
          <div class="stat">
            <span class="label" id="hudLivesLabel">Życia</span>
            <span class="value value-lives" id="lives">♥ ♥ ♥</span>
          </div>
        </div>
      </div>
    </div>

    <div class="leaderboard-overlay" id="leaderboardOverlay">
      <section class="leaderboard-card" aria-labelledby="leaderboardTitle">
        <p class="leaderboard-kicker" id="leaderboardKicker">Arkanoid</p>
        <h2 class="leaderboard-title" id="leaderboardTitle">Tablica wyników</h2>
        <p class="leaderboard-subtitle" id="leaderboardSubtitle"></p>
        <form class="leaderboard-form hidden" id="scoreForm" autocomplete="off">
          <label class="leaderboard-label" for="playerName" id="playerNameLabel">Imię / inicjał</label>
          <div class="leaderboard-form-row">
            <input
              class="leaderboard-input"
              id="playerName"
              name="playerName"
              type="text"
              maxlength="10"
              placeholder="AAA"
            />
            <button class="leaderboard-button" id="scoreSubmitButton" type="submit">Zapisz wynik</button>
          </div>
        </form>

        <p class="leaderboard-empty hidden" id="leaderboardEmpty"></p>

        <div class="leaderboard-table-scroll">
          <table class="leaderboard-table" id="leaderboardTable" aria-label="Tablica wyników">
            <thead>
              <tr>
                <th id="leaderboardNameHeader">Imię</th>
                <th id="leaderboardLevelHeader">Level</th>
                <th id="leaderboardScoreHeader">Punkty</th>
                <th class="leaderboard-table-device" id="leaderboardDeviceHeader">Typ</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
          </table>
        </div>

        <div class="leaderboard-actions">
          <p class="leaderboard-status hidden" id="leaderboardStatus" aria-live="polite"></p>
          <button class="leaderboard-button leaderboard-button-secondary" id="leaderboardStartButton" type="button">
            Start
          </button>
        </div>
      </section>
    </div>

    <div class="leaderboard-overlay pause-overlay hidden" id="pauseOverlay">
      <section class="leaderboard-card pause-card" aria-labelledby="pauseTitle">
        <p class="leaderboard-kicker" id="pauseKicker">Arkanoid</p>
        <h2 class="leaderboard-title" id="pauseTitle">Pauza</h2>
        <p class="leaderboard-subtitle" id="pauseSubtitle" aria-label="Trzy kawy">☕ ☕ ☕</p>
        <div class="leaderboard-actions">
          <span class="leaderboard-status"></span>
          <button class="leaderboard-button leaderboard-button-secondary" id="pauseResumeButton" type="button">
            Wznów
          </button>
        </div>
      </section>
    </div>

    <div class="leaderboard-overlay pause-overlay hidden" id="startOverlay">
      <section class="leaderboard-card pause-card" aria-labelledby="startOverlayTitle">
        <p class="leaderboard-kicker" id="startKicker">Arkanoid</p>
        <h2 class="leaderboard-title" id="startOverlayTitle">Poziom 1</h2>
        <p class="leaderboard-subtitle" id="startOverlaySubtitle">Zaczynamy? 🚀</p>
        <div class="leaderboard-actions">
          <span class="leaderboard-status"></span>
          <button class="leaderboard-button leaderboard-button-secondary" id="startOverlayButton" type="button">
            Start
          </button>
        </div>
      </section>
    </div>

    <canvas id="scene" aria-label="Gra w stylu Arkanoid" draggable="false"></canvas>
    <div class="version-badge" id="versionBadge" aria-label="Wersja gry">1.4.0</div>

    <script>
      (() => {
        const version = encodeURIComponent(window.APP_VERSION || "0.0.0");
        const fallbackLocale = "en";
        const appendAppScript = () => {
          const appScript = document.createElement("script");
          appScript.src = `script.js?v=${version}`;
          document.body.appendChild(appScript);
        };
        const appendLocaleScript = (localeCode, canFallback) => {
          const localeScript = document.createElement("script");
          localeScript.src = `locales/${encodeURIComponent(localeCode)}.js?v=${version}`;
          localeScript.onload = appendAppScript;
          localeScript.onerror = () => {
            if (canFallback && localeCode !== fallbackLocale) {
              window.APP_LOCALE = fallbackLocale;
              appendLocaleScript(fallbackLocale, false);
              return;
            }
            appendAppScript();
          };
          document.body.appendChild(localeScript);
        };

        appendLocaleScript(window.APP_LOCALE || fallbackLocale, true);
      })();
    </script>
  </body>
</html>
